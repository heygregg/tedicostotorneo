<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tedicostotorneo Fermignano</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Risultati Aggiornati delle Partite</h1>

  <div class="page">

    <div class="matches">

      <div class="match">
        <span class="team">Brigata Luchezio vs Gioventù Alpina</span>
        <div class="right-side">
          <span class="score">18 - 14</span>
          <button class="info-btn" onclick="showInfo('')">Info</button>
        </div>
      </div>

      <div class="match">
        <span class="team">Juventus vs Roma</span>
        <div class="right-side">
          <span class="score">1 - 1</span>
          <button class="info-btn" onclick="showInfo('juveRoma')">Info</button>
        </div>
      </div>

      <div class="match">
          <div class="left-side">
                  <span class="team">Juventus vs Roma</span>
                  <span class="date">12/05/2026</span>
            </div>

        <div class="right-side">
                  <span class="score">1 - 1</span>
              <button class="info-btn" onclick="showInfo('juveRoma')">Info</button>
              </div>
      </div>

    </div>

    <div class="info-panel">
      <h2>Giocatori</h2>
      <div id="players">
        Clicca "Info" su una partita
      </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
