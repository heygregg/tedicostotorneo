<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Torneo Calcio A5 Fermignano</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Risultati Aggiornati delle Partite</h1>

  <div class="page">

    <div class="matches">

      <div class="match">
        <span class="team">Milan vs Inter</span>
        <div class="right-side">
          <span class="score">2 - 1</span>
          <button class="info-btn" onclick="showInfo('milanInter')">Info</button>
        </div>
      </div>

      <div class="match">
        <span class="team">Juventus vs Roma</span>
        <div class="right-side">
          <span class="score">1 - 1</span>
          <button class="info-btn" onclick="showInfo('juveRoma')">Info</button>
        </div>
      </div>

      <div class="match">
        <span class="team">Napoli vs Lazio</span>
        <div class="right-side">
          <span class="score">3 - 0</span>
          <button class="info-btn" onclick="showInfo('napoliLazio')">Info</button>
        </div>
      </div>

    </div>

    <div class="info-panel">
      <h2>Giocatori</h2>
      <div id="players">
        Clicca "Info" su una partita
      </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
